name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "*.sh"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  release:
    uses: cplieger/ci/.github/workflows/docker-release.yaml@f024f691d9c2fcbaff3c74231a4cb25126630056 # v1
    with:
      registries: "ghcr,dockerhub"
      notify-repo: "cplieger/homelab"
      platforms: "arm64"
    secrets: inherit
