name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: cplieger/ci/.github/workflows/shell-ci.yaml@38aa4e20293b20ff3f707553f46f54e287c97b5f # v1
    with:
      hadolint-ignores: "DL3018,DL3008"
      shellcheck-paths: "./*.sh"