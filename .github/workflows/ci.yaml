name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

jobs:
  ci:
    uses: cplieger/ci/.github/workflows/shell-ci.yaml@v1
    with:
      hadolint-ignores: "DL3018,DL3008"
      shellcheck-paths: "./*.sh"
