name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

jobs:
  ci:
    uses: cplieger/ci/.github/workflows/shell-ci.yaml@98c2f685fa19abbbc43735b1108bfd53d30e65e0 # v1
    with:
      hadolint-ignores: "DL3018,DL3008"
      shellcheck-paths: "./*.sh"
