# Per-app config for the shared image-smoke harness (tests/image-smoke.sh,
# synced from cplieger/ci). Waits for the container HEALTHCHECK (nc 127.0.0.1 25
# expecting a 220 banner) to report "healthy" - proving the Postfix daemon
# actually starts and answers in the assembled image (what the build-time
# render-test cannot). RELAY_HOST is the one required env var (entrypoint
# validation exits 2 without it); a dummy hostname satisfies it, and neither the
# fail-soft startup probe nor the smtpd 220 banner needs a reachable upstream.
SMOKE_APP_NAME=smtp-relay
SMOKE_TIMEOUT=90
SMOKE_RUN_ARGS="-e RELAY_HOST=smtp.example.com"
